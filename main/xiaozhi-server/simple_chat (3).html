<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小智基础对话页</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #16a34a;
      --warn: #f59e0b;
      --err: #ef4444;
      --user: #1d4ed8;
      --bot: #374151;
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 880px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #0b1224 0%, #111827 100%);
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .config {
      padding: 12px 16px;
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.5);
    }

    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: 120px 1fr;
      align-items: center;
    }

    .row label {
      color: var(--muted);
      font-size: 13px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #60a5fa;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      color: #fff;
      background: var(--btn);
      cursor: pointer;
    }

    button:hover {
      background: var(--btn-hover);
    }

    button.secondary {
      background: #475569;
    }

    button.secondary:hover {
      background: #334155;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: middle;
      background: var(--err);
    }

    .status.online .dot {
      background: var(--ok);
    }

    .chat {
      height: 420px;
      overflow-y: auto;
      padding: 14px;
      background: linear-gradient(180deg, rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.1));
    }

    .msg {
      margin: 0 0 10px;
      display: flex;
    }

    .bubble {
      max-width: 85%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.user .bubble {
      background: var(--user);
      border-color: #1e40af;
    }

    .msg.bot .bubble {
      background: var(--bot);
    }

    /* 流式输出时气泡末尾的光标动画 */
    .msg.bot .bubble.streaming::after {
      content: '▍';
      display: inline-block;
      animation: blink 0.7s step-start infinite;
      margin-left: 2px;
      opacity: 0.7;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .msg.sys .bubble {
      background: #111827;
      color: var(--muted);
    }

    .composer {
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(15, 23, 42, 0.65);
    }

    .time-tag {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 2px;
      opacity: 0.75;
      font-variant-numeric: tabular-nums;
    }

    .msg.bot .time-tag {
      text-align: left;
    }

    .time-tag .time-icon {
      margin-right: 3px;
    }

    /* 实时计时器 - 气泡内嵌角标 */
    .timer-badge {
      display: inline-block;
      font-size: 11px;
      color: #60a5fa;
      background: rgba(96,165,250,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      font-variant-numeric: tabular-nums;
      vertical-align: middle;
      animation: pulse-timer 1s ease-in-out infinite;
    }

    @keyframes pulse-timer {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.4; }
    }

    .hint {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      padding: 0 14px 12px;
    }

    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }

      .chat {
        height: 48vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">小智基础对话页</h1>
      <p class="subtitle">支持语音模式（type:tts）与文本模式（type:text）：OTA -> WebSocket -> hello/listen 对话</p>
    </div>

    <div class="config">
      <div class="row">
        <label for="otaUrl">OTA 地址</label>
        <input id="otaUrl" type="text" placeholder="例如：http://127.0.0.1:8002/xiaozhi/ota/" />
      </div>
      <div class="row">
        <label for="deviceId">Device-Id</label>
        <input id="deviceId" type="text" />
      </div>
      <div class="row">
        <label for="clientId">Client-Id</label>
        <input id="clientId" type="text" />
      </div>
      <div class="row">
        <label for="phoneNumber">Phone-Number</label>
        <input id="phoneNumber" type="text" placeholder="默认：15012340012" />
      </div>
      <div class="row">
        <label for="wsUrl">实际 WS 地址</label>
        <input id="wsUrl" type="text" readonly />
      </div>
      <div class="actions">
        <button id="connectBtn">连接</button>
        <button id="disconnectBtn" class="secondary" disabled>断开</button>
        <span id="status" class="status"><span class="dot"></span>未连接</span>
      </div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="composer">
      <input id="messageInput" type="text" placeholder="输入消息，按 Enter 发送" disabled />
      <button id="sendBtn" disabled>发送</button>
    </div>
    <p class="hint">请使用 HTTP 服务打开本页面，不要直接 file:// 打开。</p>
  </div>

  <script>
    const STORAGE_KEYS = {
      otaUrl: 'simple_chat_ota_url',
      deviceId: 'simple_chat_device_id',
      clientId: 'simple_chat_client_id',
      phoneNumber: 'simple_chat_phone_number'
    };

    const state = {
      ws: null,
      connected: false,
      sessionId: null,
      deviceName: 'Web测试设备',
      // type:text 流式输出状态
      textBubble: null,   // 当前正在接收 delta 的气泡 DOM 元素，null 表示无进行中的流
      textMsgEl: null,    // textBubble 的父级 msg div，用于追加耗时标签
      // 耗时统计
      replyStartTime: null,  // 发送消息的时间戳（ms）
      replyTimer: null       // 实时计时器 interval id
    };

    const el = {
      otaUrl: document.getElementById('otaUrl'),
      deviceId: document.getElementById('deviceId'),
      clientId: document.getElementById('clientId'),
      phoneNumber: document.getElementById('phoneNumber'),
      wsUrl: document.getElementById('wsUrl'),
      connectBtn: document.getElementById('connectBtn'),
      disconnectBtn: document.getElementById('disconnectBtn'),
      status: document.getElementById('status'),
      chat: document.getElementById('chat'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn')
    };

    function randomMac() {
      const hex = '0123456789ABCDEF';
      const parts = [];
      for (let i = 0; i < 6; i += 1) {
        parts.push(hex[Math.floor(Math.random() * 16)] + hex[Math.floor(Math.random() * 16)]);
      }
      return parts.join(':');
    }

    function appendMessage(role, text) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      msg.appendChild(bubble);
      el.chat.appendChild(msg);
      el.chat.scrollTop = el.chat.scrollHeight;
    }

    /**
     * 创建一个空的 bot 气泡用于流式追加，返回 bubble 元素。
     * 气泡带 streaming class，显示打字光标动画。
     */
    function appendStreamingBubble() {
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      const bubble = document.createElement('div');
      bubble.className = 'bubble streaming';
      msg.appendChild(bubble);
      el.chat.appendChild(msg);
      el.chat.scrollTop = el.chat.scrollHeight;
      state.textMsgEl = msg;
      return bubble;
    }

    /** 开始计时：记录时间，在气泡上显示实时 badge */
    function startTiming(bubble) {
      state.replyStartTime = performance.now();
      // 在气泡末尾加实时计时 badge
      const badge = document.createElement('span');
      badge.className = 'timer-badge';
      badge.id = 'live-timer';
      badge.textContent = '0.0s';
      bubble.appendChild(badge);

      clearInterval(state.replyTimer);
      state.replyTimer = setInterval(() => {
        const elapsed = (performance.now() - state.replyStartTime) / 1000;
        const b = document.getElementById('live-timer');
        if (b) b.textContent = elapsed.toFixed(1) + 's';
      }, 100);
    }

    /** 停止计时并在气泡下方追加耗时标签 */
    function stopTiming(msgEl) {
      clearInterval(state.replyTimer);
      state.replyTimer = null;

      // 移除实时 badge
      const badge = document.getElementById('live-timer');
      if (badge) badge.remove();

      if (state.replyStartTime === null) return;
      const elapsed = ((performance.now() - state.replyStartTime) / 1000).toFixed(2);
      state.replyStartTime = null;

      const tag = document.createElement('div');
      tag.className = 'time-tag';
      tag.innerHTML = `<span class="time-icon">⏱</span>回复耗时 <b>${elapsed}s</b>`;
      msgEl.appendChild(tag);
    }

    function setStatus(connected, text) {
      state.connected = connected;
      el.status.className = connected ? 'status online' : 'status';
      el.status.innerHTML = `<span class="dot"></span>${text}`;
      el.connectBtn.disabled = connected;
      el.disconnectBtn.disabled = !connected;
      el.messageInput.disabled = !connected;
      el.sendBtn.disabled = !connected;
    }

    function saveLocalConfig() {
      localStorage.setItem(STORAGE_KEYS.otaUrl, el.otaUrl.value.trim());
      localStorage.setItem(STORAGE_KEYS.deviceId, el.deviceId.value.trim());
      localStorage.setItem(STORAGE_KEYS.clientId, el.clientId.value.trim());
      localStorage.setItem(STORAGE_KEYS.phoneNumber, el.phoneNumber.value.trim());
    }

    function loadLocalConfig() {
      el.otaUrl.value = localStorage.getItem(STORAGE_KEYS.otaUrl) || 'http://127.0.0.1:8002/xiaozhi/ota/';
      el.deviceId.value = localStorage.getItem(STORAGE_KEYS.deviceId) || randomMac();
      el.clientId.value = localStorage.getItem(STORAGE_KEYS.clientId) || 'web_test_client';
      el.phoneNumber.value = localStorage.getItem(STORAGE_KEYS.phoneNumber) || '15012340012';
      saveLocalConfig();
    }

    async function requestOtaConfig() {
      const otaUrl = el.otaUrl.value.trim();
      const deviceId = el.deviceId.value.trim();
      const clientId = el.clientId.value.trim();

      if (!otaUrl || !deviceId || !clientId) {
        throw new Error('OTA 地址、Device-Id、Client-Id 不能为空');
      }

      const response = await fetch(otaUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Device-Id': deviceId,
          'Client-Id': clientId
        },
        body: JSON.stringify({
          version: 0,
          uuid: '',
          application: {
            name: 'xiaozhi-web-test',
            version: '1.0.0',
            compile_time: '2025-04-16 10:00:00',
            idf_version: '4.4.3',
            elf_sha256: '1234567890abcdef1234567890abcdef1234567890abcdef'
          },
          ota: {
            label: 'xiaozhi-web-test'
          },
          board: {
            type: state.deviceName,
            ssid: 'xiaozhi-web-test',
            rssi: 0,
            channel: 0,
            ip: '192.168.1.1',
            mac: deviceId
          },
          flash_size: 0,
          minimum_free_heap_size: 0,
          mac_address: deviceId
        })
      });

      if (!response.ok) {
        throw new Error(`OTA 请求失败: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();
      if (!data.websocket || !data.websocket.url) {
        throw new Error('OTA 返回缺少 websocket.url');
      }

      return data.websocket;
    }

    function buildWsUrlFromOta(websocketInfo) {
      let baseUrl = websocketInfo.url;
      if (baseUrl.startsWith('http://')) {
        baseUrl = 'ws://' + baseUrl.slice('http://'.length);
      } else if (baseUrl.startsWith('https://')) {
        baseUrl = 'wss://' + baseUrl.slice('https://'.length);
      }

      const url = new URL(baseUrl);
      url.pathname = url.pathname.replace(/\/+$/, '');
      const token = websocketInfo.token || '';
      const deviceId = el.deviceId.value.trim();
      const clientId = el.clientId.value.trim();

      if (token) {
        const auth = token.startsWith('Bearer ') ? token : `Bearer ${token}`;
        url.searchParams.set('authorization', auth);
      }

      url.searchParams.set('device-id', deviceId);
      url.searchParams.set('client-id', clientId);
      return url.toString().replace(/\/\?/, '?');
    }

    function makeWsCandidates(wsUrl) {
      const candidates = [];
      const addCandidate = (urlStr) => {
        if (urlStr && !candidates.includes(urlStr)) {
          candidates.push(urlStr);
        }
      };

      addCandidate(wsUrl);

      try {
        const url = new URL(wsUrl);
        const isPublicHost = !['localhost', '127.0.0.1'].includes(url.hostname);

        if (url.protocol === 'ws:' && (window.location.protocol === 'https:' || isPublicHost)) {
          const wssUrl = new URL(url.toString());
          wssUrl.protocol = 'wss:';
          addCandidate(wssUrl.toString());

          if (wssUrl.port === '8000') {
            const noPortWss = new URL(wssUrl.toString());
            noPortWss.port = '';
            addCandidate(noPortWss.toString());
          }
        }
      } catch (e) {
        console.error('makeWsCandidates parse error:', e);
      }

      return candidates;
    }

    function openWebSocketWithTimeout(url, timeoutMs = 7000) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const ws = new WebSocket(url);

        const cleanup = () => {
          ws.removeEventListener('open', onOpen);
          ws.removeEventListener('error', onError);
          ws.removeEventListener('close', onCloseBeforeOpen);
          clearTimeout(timer);
        };

        const done = (ok, value) => {
          if (settled) return;
          settled = true;
          cleanup();
          if (ok) {
            resolve(value);
          } else {
            try {
              ws.close();
            } catch (_) {
              // ignore
            }
            reject(value);
          }
        };

        const onOpen = () => done(true, ws);
        const onError = () => done(false, new Error('WebSocket error event'));
        const onCloseBeforeOpen = (event) => done(false, new Error(`WebSocket close before open: code=${event.code}, reason=${event.reason || '无'}`));

        const timer = setTimeout(() => {
          done(false, new Error(`WebSocket connect timeout (${timeoutMs}ms)`));
        }, timeoutMs);

        ws.addEventListener('open', onOpen);
        ws.addEventListener('error', onError);
        ws.addEventListener('close', onCloseBeforeOpen);
      });
    }

    async function connectWithFallback(candidates) {
      const errors = [];

      for (let i = 0; i < candidates.length; i += 1) {
        const candidate = candidates[i];
        appendMessage('sys', `尝试连接 (${i + 1}/${candidates.length})\n${candidate}`);
        try {
          const ws = await openWebSocketWithTimeout(candidate);
          return ws;
        } catch (err) {
          const reason = err && err.message ? err.message : String(err);
          errors.push(`${candidate} -> ${reason}`);
          appendMessage('sys', `连接失败: ${reason}`);
        }
      }

      throw new Error(`全部连接尝试失败:\n${errors.join('\n')}`);
    }

    function attachWebSocketHandlers(ws) {
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setStatus(true, '已连接');
        appendMessage('sys', 'WebSocket 已连接，发送 hello...');
        sendHello();
      };

      ws.onclose = (event) => {
        setStatus(false, '已断开');
        // 连接断开时若有未结束的文本流，清理气泡的 streaming 状态
        if (state.textBubble) {
          state.textBubble.classList.remove('streaming');
          state.textBubble = null;
          state.textMsgEl = null;
        }
        // 清理计时器
        clearInterval(state.replyTimer);
        state.replyTimer = null;
        state.replyStartTime = null;
        const badge = document.getElementById('live-timer');
        if (badge) badge.remove();
        appendMessage('sys', `连接已断开 (code=${event.code}, reason=${event.reason || '无'})`);
        state.ws = null;
        state.sessionId = null;
      };

      ws.onerror = (event) => {
        appendMessage('sys', `连接发生错误，请检查服务地址和鉴权配置\n当前WS: ${el.wsUrl.value || '(空)'}`);
        console.error('WebSocket error event:', event);
      };

      ws.onmessage = (event) => {
        if (typeof event.data !== 'string') {
          // 忽略服务端推送的二进制音频帧（语音模式）
          return;
        }

        try {
          const msg = JSON.parse(event.data);

          if (msg.type === 'hello') {
            state.sessionId = msg.session_id || null;
            appendMessage('bot', `握手成功，session_id=${state.sessionId || 'N/A'}`);
            return;
          }

          // ---- type:text 文本模式（新增）----
          if (msg.type === 'text') {
            if (msg.state === 'start') {
              // 新建一个流式气泡，开始接收
              state.textBubble = appendStreamingBubble();
              // 启动实时计时 badge
              startTiming(state.textBubble);
            } else if (msg.state === 'delta' && msg.text) {
              if (state.textBubble) {
                // 在 badge 之前插入文本节点，保持 badge 在末尾
                const badge = document.getElementById('live-timer');
                if (badge) {
                  state.textBubble.insertBefore(document.createTextNode(msg.text), badge);
                } else {
                  state.textBubble.textContent += msg.text;
                }
                el.chat.scrollTop = el.chat.scrollHeight;
              } else {
                // 兜底：未收到 start 直接收到 delta，新建气泡显示
                state.textBubble = appendStreamingBubble();
                startTiming(state.textBubble);
                const badge = document.getElementById('live-timer');
                if (badge) {
                  state.textBubble.insertBefore(document.createTextNode(msg.text), badge);
                } else {
                  state.textBubble.textContent = msg.text;
                }
                el.chat.scrollTop = el.chat.scrollHeight;
              }
            } else if (msg.state === 'stop') {
              // 回复结束，移除光标动画，显示耗时
              if (state.textBubble) {
                state.textBubble.classList.remove('streaming');
                stopTiming(state.textMsgEl);
                state.textBubble = null;
                state.textMsgEl = null;
              }
            }
            return;
          }
          // ---- end type:text ----

          if (msg.type === 'llm' && msg.text) {
            // llm 单条消息：追加消息并显示耗时
            const msgEl = document.createElement('div');
            msgEl.className = 'msg bot';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = msg.text;
            msgEl.appendChild(bubble);
            el.chat.appendChild(msgEl);
            el.chat.scrollTop = el.chat.scrollHeight;
            stopTiming(msgEl);
            return;
          }

          if (msg.type === 'stt' && msg.text) {
            appendMessage('sys', `识别: ${msg.text}`);
            return;
          }

          if (msg.type === 'tts') {
            appendMessage('sys', `TTS: ${msg.state || 'unknown'} ${msg.text || ''}`.trim());
            return;
          }

          appendMessage('sys', `收到消息: ${JSON.stringify(msg)}`);
        } catch (err) {
          appendMessage('sys', `收到非 JSON 文本: ${event.data}`);
        }
      };
    }

    function sendHello() {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        return;
      }

      const hello = {
        type: 'hello',
        device_id: el.deviceId.value.trim(),
        device_name: state.deviceName,
        device_mac: el.deviceId.value.trim(),
        features: {
          mcp: true,
          audio: false
        },
        audio: {
          input: { enabled: false },
          output: { enabled: false }
        }
      };

      state.ws.send(JSON.stringify(hello));
    }

    function sendText(text) {
      if (!text || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
        return;
      }

      const payload = {
        type: 'listen',
        state: 'detect',
        text,
        phone_number: el.phoneNumber.value.trim() || '15012340012'
      };

      state.ws.send(JSON.stringify(payload));
      appendMessage('user', text);
      // 开始计时，等待 AI 第一个回复事件时附加到气泡
      state.replyStartTime = performance.now();
      clearInterval(state.replyTimer);
      state.replyTimer = null;
    }

    async function connect() {
      if (state.connected) {
        return;
      }

      try {
        saveLocalConfig();
        setStatus(false, '正在获取 OTA 配置...');

        const websocketInfo = await requestOtaConfig();
        const wsUrl = buildWsUrlFromOta(websocketInfo);
        const candidates = makeWsCandidates(wsUrl);
        el.wsUrl.value = candidates[0] || wsUrl;

        appendMessage('sys', `OTA 成功，准备连接 WebSocket...\n候选地址数量: ${candidates.length}`);

        state.ws = await connectWithFallback(candidates);
        el.wsUrl.value = state.ws.url;
        attachWebSocketHandlers(state.ws);

        setStatus(true, '已连接');
        appendMessage('sys', `WebSocket 已连接: ${state.ws.url}\n发送 hello...`);
        sendHello();
      } catch (err) {
        setStatus(false, '未连接');
        appendMessage('sys', err.message || '连接失败');
      }
    }

    function disconnect() {
      if (state.ws) {
        state.ws.close();
      }
    }

    function bindEvents() {
      el.connectBtn.addEventListener('click', connect);
      el.disconnectBtn.addEventListener('click', disconnect);

      el.sendBtn.addEventListener('click', () => {
        const text = el.messageInput.value.trim();
        if (!text) {
          return;
        }
        sendText(text);
        el.messageInput.value = '';
      });

      el.messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          el.sendBtn.click();
        }
      });

      [el.otaUrl, el.deviceId, el.clientId, el.phoneNumber].forEach((input) => {
        input.addEventListener('change', saveLocalConfig);
      });
    }

    loadLocalConfig();
    bindEvents();
    setStatus(false, '未连接');
    appendMessage('sys', '页面已就绪，请先填写 OTA 地址并点击连接');
  </script>
</body>
</html>
